<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Altiora Intake Form</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Lato',sans-serif;
    color:#1E2D3D;
    background:#EAF7FC;
    margin:0;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.12);
}

h1{
    color:#12345B;
    font-family:'Playfair Display',serif;
}

label{
    display:block;
    margin-top:20px;
    font-weight:bold;
}

input,
textarea,
select{

    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

textarea{
    height:120px;
}

button{

    margin-top:25px;
    background:#12345B;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:30px;
    cursor:pointer;
    font-weight:bold;
}


button:hover{
    background:#0d2747;
}

.back{

    display:inline-block;
    margin-top:20px;
    color:#12345B;
}


</style>

</head>


<body>


<div class="container">


<h1>Getting Started With Altiora</h1>


<p>
Thank you for reaching out. This form helps us understand how we may best support you.
</p>



<form action="https://formspree.io/f/meebjaea" method="POST">

<input type="hidden" name="_redirect" value="https://altiorawellness.ca/thank-you.html">
<label>
Full Name
</label>

<input type="text" name="name" required>



<label>
Email Address
</label>

<input type="email" name="email" required>



<label>
Phone Number
</label>

<input type="text" name="phone">



<label>
What brings you to Altiora?
</label>

<select name="support">

<option>Mental health support</option>

<option>Addiction recovery support</option>

<option>Life transitions</option>

<option>Wellness goals</option>

<option>Family support</option>

<option>Other</option>

</select>



<label>
Tell us a little about what you are looking for support with
</label>

<textarea name="message"></textarea>



<label>
What would you like help with?
</label>

<textarea name="goals"></textarea>



<label>

<input type="checkbox" required>

I understand and agree to be contacted by Altiora.

</label>



<button type="submit">
Request Support
</button>

<input type="hidden" name="_subject" value="New Altiora Support Request">


</form>


<a class="back" href="index.html">
← Return to Altiora
</a>


</div>


</body>

</html>
